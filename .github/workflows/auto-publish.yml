name: AI Affiliate Auto Publisher

on:
  schedule:
    - cron: '0 1 * * *'    # 8:00 sang Viet Nam (UTC+7)
    - cron: '0 7 * * *'    # 14:00 trua Viet Nam
    - cron: '0 13 * * *'   # 20:00 toi Viet Nam
  workflow_dispatch:         # Nut bam chay thu cong tren GitHub

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Research keywords for all niches
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          BLOG_URL: ""
          BLOG_API_SECRET: ""
        run: python main.py research

      - name: Publish 2 articles (1 per niche rotation)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          BLOG_URL: ""
          BLOG_API_SECRET: ""
        run: python main.py publish 2

      - name: Generate static site (GitHub Pages)
        run: python generate_site.py

      - name: Deploy to GitHub Pages
        run: |
          git config user.email "ai-bot@github-actions.com"
          git config user.name "AI Affiliate Bot"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "auto: publish articles $(date '+%Y-%m-%d %H:%M') UTC"
          git push || true
